# MySql 连接配置
dsn: "root:root@tcp(127.0.0.1:3306)/devops_alert_rules?charset=utf8mb4&parseTime=True&loc=Local"
#dsn: "host=127.0.0.1 user=postgres password=123456 dbname=alert_manager port=5432 sslmode=disable TimeZone=Asia/Shanghai"
server:
    port: 30333

# Prometheus 数据源配置
prometheus:
  url: "http://localhost:9090"        # Prometheus HTTP API 地址
  timeout: 10s                        # HTTP 请求超时
  retry_count: 3                      # 失败重试次数
  retry_interval: 2s                  # 重试间隔（基础间隔，实际使用指数退避）
  cache_ttl: 30s                      # 数据缓存有效期
