version: "3.8"

services:
    mysql:
        image: mysql:8.0
        container_name: am-mysql
        command: --default-authentication-plugin=mysql_native_password
        environment:
            MYSQL_DATABASE: devops_alert_rules
            MYSQL_USER: mysql
            MYSQL_PASSWORD: 123456
            MYSQL_ROOT_PASSWORD: 123456 # For production, use secrets or a .env file
            TZ: Asia/Shanghai
        ports:
            # Expose mysql on the host for direct access if needed for debugging
            - "3302:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "-p123456",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    backend:
        build:
            context: ../backend
            dockerfile: Dockerfile
        container_name: am-backend
        ports:
            - "30333:30333"
        environment:
            # DSN for MySQL, pointing to the 'mysql' service
            - DB_DSN=mysql:123456@tcp(mysql:3306)/devops_alert_rules?charset=utf8mb4&parseTime=True&loc=Local
            - ADMIN_USER=admin
            - ADMIN_PASSWORD=admin
            - TZ=Asia/Shanghai
        depends_on:
            mysql:
                condition: service_healthy
        restart: unless-stopped

    frontend:
        build:
            context: ../frontend
            dockerfile: Dockerfile
        container_name: am-frontend
        ports:
            - "8081:80" # Map host port 8081 to the container's Nginx port 80
        environment:
            - TZ=Asia/Shanghai
        depends_on:
            - backend
        restart: unless-stopped
        # The nginx.conf inside the frontend image proxies API calls to http://backend:8080

volumes:
    mysql_data:
